name: Terraform CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  TF_VERSION: "1.7.0"

jobs:
  # ── Lint & Validate ──────────────────────────────────────────────────────────
  validate:
    name: Format & Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, staging, prod]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: environments/${{ matrix.environment }}

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: environments/${{ matrix.environment }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: environments/${{ matrix.environment }}

  # ── Plan (PRs only) ──────────────────────────────────────────────────────────
  plan:
    name: Plan (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        environment: [dev, staging, prod]

    env:
      # Cloud provider credentials — add these as GitHub Actions secrets
      AWS_ACCESS_KEY_ID:        ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY:    ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      ARM_CLIENT_ID:            ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET:        ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID:      ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID:            ${{ secrets.ARM_TENANT_ID }}
      GOOGLE_CREDENTIALS:       ${{ secrets.GOOGLE_CREDENTIALS }}
      PM_API_TOKEN_ID:          ${{ secrets.PM_API_TOKEN_ID }}
      PM_API_TOKEN_SECRET:      ${{ secrets.PM_API_TOKEN_SECRET }}
      VSPHERE_USER:             ${{ secrets.VSPHERE_USER }}
      VSPHERE_PASSWORD:         ${{ secrets.VSPHERE_PASSWORD }}
      TF_VAR_hyperv_host:       ${{ secrets.HYPERV_HOST }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init
        working-directory: environments/${{ matrix.environment }}

      - name: Terraform Plan
        run: |
          terraform plan \
            -var-file="terraform.example.tfvars" \
            -out=tfplan \
            -no-color
        working-directory: environments/${{ matrix.environment }}

      - name: Post Plan to PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const output = `#### Terraform Plan \`${{ matrix.environment }}\`
            \`terraform plan\` finished for environment **${{ matrix.environment }}**

            *Triggered by @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  # ── Apply (merge to main only) ───────────────────────────────────────────────
  apply-dev:
    name: Apply (dev)
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: dev

    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      ARM_CLIENT_ID:         ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET:     ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID:   ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID:         ${{ secrets.ARM_TENANT_ID }}
      GOOGLE_CREDENTIALS:    ${{ secrets.GOOGLE_CREDENTIALS }}
      PM_API_TOKEN_ID:       ${{ secrets.PM_API_TOKEN_ID }}
      PM_API_TOKEN_SECRET:   ${{ secrets.PM_API_TOKEN_SECRET }}
      VSPHERE_USER:          ${{ secrets.VSPHERE_USER }}
      VSPHERE_PASSWORD:      ${{ secrets.VSPHERE_PASSWORD }}
      TF_VAR_hyperv_host:    ${{ secrets.HYPERV_HOST }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init
        working-directory: environments/dev

      - name: Terraform Apply
        run: terraform apply -var-file="terraform.example.tfvars" -auto-approve
        working-directory: environments/dev
